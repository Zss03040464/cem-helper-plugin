<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Mock Form Demo</title>
</head>
<body>
  <h1>示例表单</h1>
  <form>
    <label for="姓名">姓名：</label>
    <input type="text" id="姓名" name="姓名" /><br /><br />
    <label for="联系电话">联系电话：</label>
    <input type="text" id="联系电话" name="联系电话" /><br /><br />
    <label for="邮箱">邮箱：</label>
    <input type="text" id="邮箱" name="邮箱" /><br /><br />
    <label for="城市">城市：</label>
    <input type="text" id="城市" name="城市" value="" /><br /><br />
    <button type="submit">提交</button>
  </form>
</body>
</html>
